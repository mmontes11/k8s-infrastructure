apiVersion: helm.toolkit.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: media
spec:
  releaseName: media
  targetNamespace: media
  chart:
    spec:
      chart: tenant
      sourceRef:
        kind: HelmRepository
        name: mmontes
        namespace: flux-system
      version: "0.2.0"
  interval: 5m
  values:
    repo:
      url: ssh://git@github.com/mmontes11/k8s-media
      branch: main
      path: ./clusters/homelab
      secretName: flux-system
