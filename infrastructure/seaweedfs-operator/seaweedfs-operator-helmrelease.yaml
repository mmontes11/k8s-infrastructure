apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seaweedfs-operator
spec:
  chart:
    spec:
      chart: seaweedfs-operator
      sourceRef:
        kind: HelmRepository
        name: seaweedfs-operator
      version: "0.1.32"
  interval: 1h0m0s
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    resources:
      requests:
        cpu: 200m
        memory: 120Mi
      limits:
        cpu: 500m
        memory: 500Mi
    grafanaDashboard:
      enabled: true
    serviceMonitor:
      enabled: true
      interval: 1m
      scrapeTimeout: 10s
      honorLabels: true
