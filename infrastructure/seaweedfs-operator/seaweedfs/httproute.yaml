# Cluster management UI (admin) and S3 API are exposed under separate hostnames,
# mirroring the minio-console / minio split. Backends are plain HTTP: seaweedfs
# TLS only secures inter-component gRPC (mTLS); edge TLS is terminated at
# traefik-internal.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: seaweedfs
spec:
  parentRefs:
    - name: traefik-internal
      namespace: networking
  hostnames:
    - "seaweedfs.mmontes-internal.duckdns.org"
  rules:
    - backendRefs:
        - name: seaweedfs-admin
          port: 23646
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: seaweedfs-s3
spec:
  parentRefs:
    - name: traefik-internal
      namespace: networking
  hostnames:
    - "s3.mmontes-internal.duckdns.org"
  rules:
    - backendRefs:
        - name: seaweedfs-s3
          port: 8333
