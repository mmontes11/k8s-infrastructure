# seaweedfs tenant: a dedicated logical database with a user that has full
# access to it. Used by SeaweedFS as its filer metadata store.
#
# Connection details for SeaweedFS (WEED_MYSQL_* env vars):
#   https://github.com/seaweedfs/seaweedfs/wiki/Environment-Variables#mysqlmariadb-configuration
#
#   WEED_MYSQL_ENABLED  = true
#   WEED_MYSQL_HOSTNAME = mariadb-primary.database.svc.cluster.local   # primary (read-write) Service
#   WEED_MYSQL_PORT     = 3306
#   WEED_MYSQL_DATABASE = seaweedfs
#   WEED_MYSQL_USERNAME = seaweedfs
#   WEED_MYSQL_PASSWORD = <Secret mariadb/seaweedfs>
#
# The password lives in the SealedSecret-backed Secret "mariadb" (key "seaweedfs")
# in the "database" namespace; reference it from the SeaweedFS deployment.
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Database
metadata:
  name: seaweedfs
spec:
  mariaDbRef:
    name: mariadb
  characterSet: utf8mb4
  collate: utf8mb4_unicode_ci
  cleanupPolicy: Skip
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: seaweedfs
spec:
  mariaDbRef:
    name: mariadb
  passwordSecretKeyRef:
    name: mariadb
    key: seaweedfs
  host: "%"
  # 0 = no per-user connection limit (defers to the server default).
  maxUserConnections: 0
  cleanupPolicy: Skip
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: seaweedfs
spec:
  mariaDbRef:
    name: mariadb
  privileges:
    - "ALL PRIVILEGES"
  database: seaweedfs
  table: "*"
  username: seaweedfs
  host: "%"
  grantOption: false
  cleanupPolicy: Skip
