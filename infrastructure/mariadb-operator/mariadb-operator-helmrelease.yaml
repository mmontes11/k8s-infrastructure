apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator
spec:
  dependsOn:
    - name: mariadb-operator-crds
  chartRef:
    kind: OCIRepository
    name: mariadb-operator
  interval: 1h0m0s
  values:
    logLevel: INFO
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    webhook:
      cert:
        certManager:
          enabled: true
          issuerRef:
            kind: ClusterIssuer
            name: homelab
      serviceMonitor:
        enabled: true