apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubelet-csr-approver
spec:
  chartRef:
    kind: OCIRepository
    name: kubelet-csr-approver
  interval: 1h0m0s
  values:
    leaderElection: true
    replicas: 2

    providerRegex: ^.*$
    bypassDnsResolution: true
    bypassHostnameCheck: true
