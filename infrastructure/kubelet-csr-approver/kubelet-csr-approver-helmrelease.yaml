apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubelet-csr-approver
spec:
  chart:
    spec:
      chart: kubelet-csr-approver
      version: "1.2.2"
      sourceRef:
        kind: HelmRepository
        name: kubelet-csr-approver
        namespace: pki
  interval: 1h0m0s
  values:
    leaderElection: true
    replicas: 2

    providerRegex: ^.*$
    bypassDnsResolution: true
    bypassHostnameCheck: true
