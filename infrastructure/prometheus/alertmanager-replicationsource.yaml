apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: alertmanager
spec:
  sourcePVC: data-alertmanager-kube-prometheus-stack-alertmanager-0
  trigger:
    schedule: "0 1 * * *"
    # manual: alertmanager-1
  restic:
    repository: restic-alertmanager
    retain:
      daily: 7
    pruneIntervalDays: 14
    unlock: alertmanager-1
    copyMethod: Clone
    moverResources:
      requests:
        cpu: 1
        memory: 300Mi
      limits:
        memory: 4Gi
    cacheCapacity: 10Gi
    cacheAccessModes:
      - ReadWriteOnce
    customCA:
      secretName: homelab-bundle
      key: ca.crt
