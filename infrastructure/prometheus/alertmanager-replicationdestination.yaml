apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: alertmanager
spec:
  trigger:
    # schedule: "0 4 * * *"
    manual: alertmanager-1
  restic:
    repository: restic-alertmanager
    destinationPVC: data-alertmanager-kube-alertmanager-stack-alertmanager-0
    copyMethod: Snapshot
    moverResources:
      requests:
        cpu: 1
        memory: 300Mi
      limits:
        memory: 4Gi
    cacheCapacity: 10Gi
    cacheAccessModes:
      - ReadWriteOnce
    customCA:
      secretName: homelab-bundle
      key: ca.crt
