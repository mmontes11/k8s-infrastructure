apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-external
spec:
  chartRef:
    kind: OCIRepository
    name: traefik
  interval: 1h0m0s
  crds: Skip
  values:
    instanceLabelOverride: traefik-external
    logs:
      general:
        level: INFO
      access:
        enabled: true
    ingressRoute:
      dashboard:
        enabled: false
    ingressClass:
      enabled: true
      isDefaultClass: false
    ports:
      web:
        redirectTo:
          port: websecure
          priority: 10
    providers:
      kubernetesCRD:
        enabled: true
        ingressClass: traefik-external
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-external
    additionalArguments:
      - "--serverstransport.insecureskipverify"
      - "--experimental.kubernetesgateway"
      - "--providers.kubernetesgateway"
      - "--providers.kubernetesgateway.labelselector=gatewayclass.mmontes.io/type=traefik-external"
    service:
      annotations:
        metallb.io/loadBalancerIPs: 10.0.0.80
    deployment:
      enabled: true
      kind: Deployment
      replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        memory: 300Mi
