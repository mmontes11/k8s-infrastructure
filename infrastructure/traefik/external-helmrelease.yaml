apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-external
spec:
  chartRef:
    kind: OCIRepository
    name: traefik
  interval: 1h0m0s
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    instanceLabelOverride: traefik-external
    logs:
      general:
        level: INFO
      access:
        enabled: true
    ingressRoute:
      dashboard:
        enabled: false
    ingressClass:
      enabled: true
      isDefaultClass: false
    ports:
      web:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            priority: 10
    providers:
      kubernetesCRD:
        enabled: true
        ingressClass: traefik-external
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-external
    additionalArguments:
      - "--serverstransport.insecureskipverify"
      # Not using native helm values, as the chart does not support specific funtionality we rely on, like labelselector
      # See: https://github.com/traefik/traefik-helm-chart/blob/55da74d888c3d57713ab0e03532aa99bc70bd4ca/traefik/values.yaml#L362
      - "--experimental.kubernetesgateway"
      - "--providers.kubernetesgateway"
      - "--providers.kubernetesgateway.labelselector=gatewayclass.mmontes.io/type=traefik-external"
    service:
      annotations:
        metallb.io/loadBalancerIPs: 10.0.0.80
    deployment:
      enabled: true
      kind: Deployment
      replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        memory: 300Mi
