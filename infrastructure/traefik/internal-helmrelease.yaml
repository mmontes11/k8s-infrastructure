apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-internal
spec:
  chartRef:
    kind: OCIRepository
    name: traefik
  interval: 1h0m0s
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    instanceLabelOverride: traefik-internal
    logs:
      general:
        level: INFO
      access:
        enabled: true
    ingressRoute:
      dashboard:
        enabled: false
    ingressClass:
      enabled: true
      isDefaultClass: false
    ports:
      web:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
            priority: 10
      builder-amd64:
        containerPort: 3000
        port: 3000
        expose:
          default: true
        exposedPort: 3000
        targetPort: builder-amd64
        protocol: TCP
      builder-arm64:
        containerPort: 3001
        port: 3001
        expose:
          default: true
        exposedPort: 3001
        targetPort: builder-arm64
        protocol: TCP
    providers:
      kubernetesCRD:
        enabled: true
        ingressClass: traefik-internal
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-internal
    additionalArguments:
      - "--serverstransport.insecureskipverify"
      - "--experimental.kubernetesgateway"
      - "--providers.kubernetesgateway"
      - "--providers.kubernetesgateway.labelselector=gatewayclass.mmontes.io/type=traefik-internal"
      - "--providers.kubernetesgateway.experimentalchannel=true"
    service:
      annotations:
        metallb.io/loadBalancerIPs: 10.0.0.70
    deployment:
      enabled: true
      kind: Deployment
      replicas: 2
    affinity:
     podAntiAffinity:
       requiredDuringSchedulingIgnoredDuringExecution:
         - labelSelector:
             matchLabels:
               app.kubernetes.io/name: traefik
               app.kubernetes.io/instance: traefik-internal
           topologyKey: kubernetes.io/hostname
    priorityClassName: system-node-critical 
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        memory: 300Mi
