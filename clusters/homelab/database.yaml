apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: mariadb-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager-crds
    - name: prometheus-crds
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/mariadb-operator
  prune: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: redis-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager-crds
    - name: prometheus-crds
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/redis-operator
  prune: true
  timeout: 5m
